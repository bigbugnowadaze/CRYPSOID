<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>CRYPSOID .3dphox WebGL viewer</title>
<style>
  :root { --fg: #eee; --bg: #181820; --panel: #2a2a36; --accent: #5b9; --warn: #c75; }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--fg);
               font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; overflow: hidden; }
  #canvas { display: block; width: 100vw; height: 100vh; }
  #ui { position: fixed; top: 12px; left: 12px; background: rgba(40,40,50,0.92); padding: 14px 16px;
        border-radius: 8px; max-width: 360px; font-size: 13px; line-height: 1.5;
        backdrop-filter: blur(6px); border: 1px solid #444; }
  #ui h1 { font-size: 15px; margin: 0 0 8px 0; color: var(--accent); }
  #ui .row { margin: 6px 0; }
  #ui label { display: block; font-size: 11px; opacity: 0.7; }
  #ui select, #ui input[type=range] { width: 100%; padding: 4px; background: #333; color: var(--fg);
                                       border: 1px solid #555; border-radius: 4px; }
  #ui button { padding: 4px 10px; background: var(--accent); color: #111; border: none;
                border-radius: 4px; font-weight: bold; cursor: pointer; margin-right: 4px; }
  #ui button:hover { background: #6db; }
  #drop { position: fixed; inset: 0; background: rgba(20,20,30,0.86); display: flex;
          align-items: center; justify-content: center; font-size: 28px; color: var(--accent); z-index: 10;
          border: 4px dashed var(--accent); pointer-events: none; opacity: 0; transition: opacity 0.1s; }
  #drop.show { opacity: 1; }
  #status { font-size: 11px; opacity: 0.75; min-height: 32px; }
  #stats { font-size: 11px; opacity: 0.7; margin-top: 8px; padding-top: 8px; border-top: 1px solid #444; }
  .pill { display: inline-block; padding: 2px 7px; border-radius: 10px; background: #444; margin-right: 4px; font-size: 11px; }
</style>
</head>
<body>

<canvas id="canvas"></canvas>
<div id="drop">drop a .3dphox file</div>

<div id="ui">
  <h1>CRYPSOID viewer</h1>
  <div class="row">
    <button id="loadBtn">Load .3dphox</button>
    <input id="fileInput" type="file" accept=".3dphox" style="display:none">
  </div>
  <div class="row">
    <label>Render mode</label>
    <select id="modeSelect">
      <option value="full">Full color (DC + SH)</option>
      <option value="dc">DC only</option>
      <option value="tier">Tier overlay (A=red B=green C=blue)</option>
      <option value="lit">Lit (v32a Lambert, needs v31 normals)</option>
      <option value="lit-dim-floaters">Lit + dim floaters (v32a + v33)</option>
      <option value="material-overlay">Material overlay (v33 hint colors)</option>
    </select>
  </div>
  <div class="row">
    <label>Splat scale (×<span id="scaleVal">1.00</span>)</label>
    <input id="scaleSlider" type="range" min="0.3" max="2.0" step="0.05" value="1.0">
  </div>
  <div class="row">
    <label>Splat alpha cap (×<span id="alphaVal">1.00</span>)</label>
    <input id="alphaSlider" type="range" min="0.1" max="1.0" step="0.05" value="1.0">
  </div>
  <div class="row">
    <label>Phoxoidal density (<span id="phoxVal">0.00</span> = Gaussian, 1.00 = full cubic-cusp)</label>
    <input id="phoxSlider" type="range" min="0.0" max="1.0" step="0.05" value="0.0">
  </div>
  <div class="row" id="seqRow" style="display:none">
    <label>Timeline (frame <span id="seqFrameVal">0</span>/<span id="seqFrameMax">0</span>, <span id="seqTimeVal">0</span> ms)</label>
    <input id="seqSlider" type="range" min="0" max="0" step="1" value="0">
    <div style="display:flex;gap:6px;margin-top:6px">
      <button id="seqPlayBtn">&#9654; Play</button>
      <button id="seqResetBtn">Reset</button>
      <span id="seqInfo" style="font-size:11px;opacity:0.7;align-self:center"></span>
    </div>
  </div>
  <div class="row">
    <button id="loadSeqBtn">Load .phoxseq (timeline)</button>
    <input id="seqFileInput" type="file" accept=".phoxseq" style="display:none">
  </div>
  <div id="status">no scene loaded</div>
  <div id="stats"></div>
</div>

<script>
// === Inlined decoders (so the viewer works when opened from file:// — no
//     server needed). The standalone phox_decoder.js / phoxseq_decoder.js
//     files are still shipped as ES modules for any external consumer. ===
/* ====== inlined phox_decoder.js ====== */
// CRYPSOID .3dphox decoder for the browser.
//
// Reads any of:  v25 (CRYPSOID25), v27 (CRYPSOID27), v28 render (CRYPSOID28
// non-EXACT format), v28 EXACT archive (CRYPSOID28 EXACT format).
//
// All chunks are zlib-compressed; we decompress with the browser's native
// DecompressionStream API (Chrome 80+, Firefox 113+, Safari 16.4+).
// No third-party dependencies.

const SH_C0 = 0.28209479177387814;
const GLOBAL_SCALE = 0.006946287755891094;

// ---------- low-level decoders ----------

async function inflate(u8) {
    // u8 is Uint8Array of zlib-compressed bytes
    const ds = new DecompressionStream("deflate");
    const blob = new Blob([u8]);
    const decompressedStream = blob.stream().pipeThrough(ds);
    const buf = await new Response(decompressedStream).arrayBuffer();
    return new Uint8Array(buf);
}

function readU64LE(view, off) {
    const lo = view.getUint32(off, true);
    const hi = view.getUint32(off + 4, true);
    return hi * 0x100000000 + lo;
}

// ---------- container parsing ----------

async function parsePhox(arrayBuffer) {
    const u8 = new Uint8Array(arrayBuffer);
    const dv = new DataView(arrayBuffer);

    // First 11 bytes: magic
    const magic = new TextDecoder("latin1").decode(u8.slice(0, 11));
    if (!magic.startsWith("CRYPSOID")) throw new Error("not a CRYPSOID file: " + magic);
    const version = magic.replace(/[^\d]/g, "");

    // Next 8 bytes: little-endian uint64 manifest length
    const mlen = readU64LE(dv, 11);
    const manifestBytes = u8.slice(19, 19 + mlen);
    const manifest = JSON.parse(new TextDecoder("utf-8").decode(manifestBytes));

    const blob = u8.subarray(19 + mlen);
    const chunks = {};
    for (const c of manifest.chunks) chunks[c.name] = c;

    async function decompressChunk(name) {
        const c = chunks[name];
        if (!c) return null;
        const compressed = blob.subarray(c.offset, c.offset + c.compressed_bytes);
        return await inflate(compressed);
    }

    return { magic, version, manifest, chunks, decompressChunk };
}

// ---------- per-attribute decoders ----------

function decodeU24Xyz(raw, n, boundsMin, boundsMax) {
    // raw is Uint8Array of length n*9 (3 u24 LE values per splat)
    const out = new Float32Array(n * 3);
    const span = [
        boundsMax[0] - boundsMin[0],
        boundsMax[1] - boundsMin[1],
        boundsMax[2] - boundsMin[2],
    ];
    const u24max = (1 << 24) - 1;
    let r = 0, w = 0;
    for (let i = 0; i < n; i++) {
        for (let a = 0; a < 3; a++) {
            const v = raw[r] | (raw[r + 1] << 8) | (raw[r + 2] << 16);
            out[w + a] = (v / u24max) * span[a] + boundsMin[a];
            r += 3;
        }
        w += 3;
    }
    return out;
}

function decodeF16Scales(raw, n) {
    // raw is Uint8Array of length n*6 (3 IEEE-754 float16 per splat)
    const view = new DataView(raw.buffer, raw.byteOffset, raw.byteLength);
    const out = new Float32Array(n * 3);
    for (let i = 0; i < n * 3; i++) out[i] = float16ToFloat32(view.getUint16(i * 2, true));
    return out;
}

function decodeI16Quats(raw, n) {
    const view = new DataView(raw.buffer, raw.byteOffset, raw.byteLength);
    const out = new Float32Array(n * 4);
    for (let i = 0; i < n * 4; i++) out[i] = view.getInt16(i * 2, true) / 32767;
    return out;
}

function decodeDcRgbOpacityU8(raw, n) {
    // raw is n*4 bytes: R8, G8, B8, opacity8
    const dc = new Float32Array(n * 3);
    const op = new Float32Array(n);
    let r = 0;
    for (let i = 0; i < n; i++) {
        dc[i * 3] = raw[r] / 255;
        dc[i * 3 + 1] = raw[r + 1] / 255;
        dc[i * 3 + 2] = raw[r + 2] / 255;
        op[i] = raw[r + 3] / 255;
        r += 4;
    }
    return { dc, opacity: op };
}

function decodeTierLabels(raw, n) {
    return raw.subarray(0, n);   // already uint8
}

// ---------- SH reconstruction ----------

function reconstructShVq128(idxRaw, codebookRaw, n, globalScale = GLOBAL_SCALE) {
    // idxRaw: n*3 uint8 (3 product-VQ groups)
    // codebookRaw: 3*128*15 int8 (3 groups x 128 codewords x 15 coefficients)
    const cb = new Int8Array(codebookRaw.buffer, codebookRaw.byteOffset, codebookRaw.byteLength);
    const idx = new Uint8Array(idxRaw.buffer, idxRaw.byteOffset, idxRaw.byteLength);
    const out = new Float32Array(n * 45);
    for (let i = 0; i < n; i++) {
        for (let g = 0; g < 3; g++) {
            const label = idx[i * 3 + g];
            const cbBase = g * 128 * 15 + label * 15;
            const outBase = i * 45 + g * 15;
            for (let k = 0; k < 15; k++) out[outBase + k] = cb[cbBase + k] * globalScale;
        }
    }
    return out;
}

async function reconstructShExactArchive(decompressChunk, chunks, n, tierLabels) {
    // Same as reconstructShVq128, then ADD per-tier-group residual chunks.
    const idx = await decompressChunk("sh_vq128_idx_u8");
    const cb = await decompressChunk("sh_vq128_codebook_i8");
    const cbSigned = new Int8Array(cb.buffer, cb.byteOffset, cb.byteLength);
    const idxU8 = new Uint8Array(idx.buffer, idx.byteOffset, idx.byteLength);

    // Reconstruct as int16 first so we can add residuals in int space without clipping early.
    const sh = new Int16Array(n * 45);
    for (let i = 0; i < n; i++) {
        for (let g = 0; g < 3; g++) {
            const label = idxU8[i * 3 + g];
            const cbBase = g * 128 * 15 + label * 15;
            const outBase = i * 45 + g * 15;
            for (let k = 0; k < 15; k++) sh[outBase + k] = cbSigned[cbBase + k];
        }
    }

    // Per-tier indices, in their original order
    const tierIndices = [[], [], []];
    for (let i = 0; i < n; i++) tierIndices[tierLabels[i]].push(i);

    for (let t = 0; t < 3; t++) {
        for (let g = 0; g < 3; g++) {
            const name = `sh_exact_residual_t${t}_g${g}_int8`;
            if (!chunks[name]) continue;
            const raw = await decompressChunk(name);
            const res = new Int8Array(raw.buffer, raw.byteOffset, raw.byteLength);
            const expected = tierIndices[t].length * 15;
            if (res.length !== expected)
                throw new Error(`${name}: expected ${expected} bytes, got ${res.length}`);
            for (let r = 0; r < tierIndices[t].length; r++) {
                const splatIdx = tierIndices[t][r];
                const outBase = splatIdx * 45 + g * 15;
                const inBase = r * 15;
                for (let k = 0; k < 15; k++) {
                    let v = sh[outBase + k] + res[inBase + k];
                    if (v < -128) v = -128;
                    if (v > 127) v = 127;
                    sh[outBase + k] = v;
                }
            }
        }
    }
    // Convert int8-clipped values to float using global scale
    const out = new Float32Array(n * 45);
    for (let i = 0; i < n * 45; i++) out[i] = sh[i] * GLOBAL_SCALE;
    return out;
}

// ---------- entry point ----------

async function loadPhoxAll(arrayBuffer) {
    const phox = await parsePhox(arrayBuffer);
    const n = phox.manifest.source_splats || phox.chunks.xyz_u24_fixed.shape[0];

    const xyzChunk = phox.chunks.xyz_u24_fixed;
    const xyzRaw = await phox.decompressChunk("xyz_u24_fixed");
    const xyz = decodeU24Xyz(xyzRaw, n, xyzChunk.bounds_min, xyzChunk.bounds_max);

    const scales = decodeF16Scales(await phox.decompressChunk("scale_f16"), n);
    const quats = decodeI16Quats(await phox.decompressChunk("quat_i16_norm4"), n);
    const dco = decodeDcRgbOpacityU8(await phox.decompressChunk("dc_rgb_opacity_u8"), n);
    const tier = decodeTierLabels(await phox.decompressChunk("tier_labels_u8"), n);

    let shRest = null;
    const isExact = (phox.manifest.format || "").includes("EXACT_ARCHIVE");
    if (isExact && phox.chunks.sh_vq128_idx_u8 && phox.chunks.sh_vq128_codebook_i8) {
        shRest = await reconstructShExactArchive(phox.decompressChunk, phox.chunks, n, tier);
    } else if (phox.chunks.sh_vq128_idx_u8 && phox.chunks.sh_vq128_codebook_i8) {
        const idx = await phox.decompressChunk("sh_vq128_idx_u8");
        const cb = await phox.decompressChunk("sh_vq128_codebook_i8");
        shRest = reconstructShVq128(idx, cb, n);
    } else if (phox.chunks.sh_rest_q8_global) {
        // v25 format: raw int8 SH stream
        const raw = await phox.decompressChunk("sh_rest_q8_global");
        const i8 = new Int8Array(raw.buffer, raw.byteOffset, raw.byteLength);
        shRest = new Float32Array(n * 45);
        for (let i = 0; i < n * 45; i++) shRest[i] = i8[i] * GLOBAL_SCALE;
    }

    return {
        n,
        magic: phox.magic, format: phox.manifest.format,
        xyz, scales, quats, dc: dco.dc, opacity: dco.opacity,
        sh_rest: shRest, tier,
        bounds_min: xyzChunk.bounds_min, bounds_max: xyzChunk.bounds_max,
        is_exact: isExact,
    };
}

// ---------- helpers ----------

function float16ToFloat32(h) {
    const sign = (h & 0x8000) >> 15;
    const exp  = (h & 0x7c00) >> 10;
    const frac =  h & 0x03ff;
    if (exp === 0) return (sign ? -1 : 1) * Math.pow(2, -14) * (frac / 1024);
    if (exp === 0x1f) return frac ? NaN : (sign ? -Infinity : Infinity);
    return (sign ? -1 : 1) * Math.pow(2, exp - 15) * (1 + frac / 1024);
}


// ---------- v31 trailer parsing ----------
// A v31-versioned .3dphox is: [v28 archive bytes] + [CRYPSOID31\0] + [u64 manifest_len] + [JSON manifest] + [chunks]
// Backward-compatible: v28 readers stop at the v28 region; v31 readers detect the trailer marker.

const V31_MAGIC = "CRYPSOID31\x00";

function parseV31Trailer(arrayBuffer) {
    const u8 = new Uint8Array(arrayBuffer);
    const dv = new DataView(arrayBuffer);
    // Search backwards for the trailer marker (last 30 MB at most — typically near end of file)
    const sentinel = new TextEncoder().encode(V31_MAGIC);
    let pos = -1;
    // scan from later half, byte-by-byte (small enough since file is tens of MB)
    const scanFrom = Math.max(0, u8.length - 50 * 1024 * 1024);
    outer: for (let i = u8.length - sentinel.length; i >= scanFrom; i--) {
        for (let j = 0; j < sentinel.length; j++) {
            if (u8[i + j] !== sentinel[j]) continue outer;
        }
        pos = i; break;
    }
    if (pos < 0) return null;   // no v31 trailer
    let p = pos + sentinel.length;
    const mlen = readU64LE(dv, p); p += 8;
    const manifestBytes = u8.slice(p, p + mlen);
    const manifest = JSON.parse(new TextDecoder("utf-8").decode(manifestBytes));
    p += mlen;
    const chunkRegion = u8.slice(p);
    const chunks = {};
    for (const c of manifest.chunks) {
        const start = c.offset_in_trailer;
        const end = start + c.size_bytes;
        chunks[c.name] = chunkRegion.slice(start, end);
    }
    return { magic: V31_MAGIC, manifest, chunks };
}


// ---------- v31 chunk decoders ----------

// Octahedral 24-bit + 8-bit tangent → unit normal
function decodeNormalsChunk(chunkBytes) {
    // Header: 1 B version + 1 B reserved + 4 B count + N*4 payload + 4 B CRC
    const dv = new DataView(chunkBytes.buffer, chunkBytes.byteOffset, chunkBytes.byteLength);
    const version = chunkBytes[0];
    if (version !== 0x01) throw new Error("normals chunk version " + version);
    const n = dv.getUint32(2, true);
    const expected = 6 + n*4 + 4;
    if (chunkBytes.length !== expected) throw new Error("normals chunk len " + chunkBytes.length + " != " + expected);
    const payload = chunkBytes.subarray(6, 6 + n*4);
    const out = new Float32Array(n * 3);
    for (let i = 0; i < n; i++) {
        const b0 = payload[i*4 + 0];
        const b1 = payload[i*4 + 1];
        const b2 = payload[i*4 + 2];
        // unpack 12-bit qx + 12-bit qy
        const qx = ((b1 & 0x0F) << 8) | b0;
        const qy = (b2 << 4) | ((b1 >> 4) & 0x0F);
        let x = (qx / 4095.0) * 2.0 - 1.0;
        let y = (qy / 4095.0) * 2.0 - 1.0;
        let z = 1.0 - Math.abs(x) - Math.abs(y);
        if (z < 0.0) {
            const xS = x >= 0 ? 1 : -1;
            const yS = y >= 0 ? 1 : -1;
            const xT = (1.0 - Math.abs(y)) * xS;
            const yT = (1.0 - Math.abs(x)) * yS;
            x = xT; y = yT;
        }
        const len = Math.sqrt(x*x + y*y + z*z);
        out[i*3 + 0] = x / len;
        out[i*3 + 1] = y / len;
        out[i*3 + 2] = z / len;
    }
    return out;
}

// 4 bytes/blob: hint + confidence + view_dep + mip_zoom
function decodeMaterialChunk(chunkBytes) {
    const dv = new DataView(chunkBytes.buffer, chunkBytes.byteOffset, chunkBytes.byteLength);
    const version = chunkBytes[0];
    if (version !== 0x01) throw new Error("material chunk version " + version);
    const fields = chunkBytes[1];
    if (fields !== 0x04) throw new Error("expected 4 fields, got " + fields);
    const n = dv.getUint32(2, true);
    const expected = 6 + n*4 + 4;
    if (chunkBytes.length !== expected) throw new Error("material chunk len " + chunkBytes.length + " != " + expected);
    const payload = chunkBytes.subarray(6, 6 + n*4);
    const hint = new Uint8Array(n);
    const confidence = new Uint8Array(n);
    const viewDep = new Uint8Array(n);
    const mipZoom = new Uint8Array(n);
    for (let i = 0; i < n; i++) {
        hint[i]       = payload[i*4 + 0];
        confidence[i] = payload[i*4 + 1];
        viewDep[i]    = payload[i*4 + 2];
        mipZoom[i]    = payload[i*4 + 3];
    }
    return { hint, confidence, viewDep, mipZoom };
}

// kNN edges: 16 bytes/blob (4 × u32)
function decodeEdgesChunk(chunkBytes) {
    const dv = new DataView(chunkBytes.buffer, chunkBytes.byteOffset, chunkBytes.byteLength);
    const version = chunkBytes[0];
    if (version !== 0x01) throw new Error("edges chunk version " + version);
    const k = chunkBytes[1];
    const n = dv.getUint32(2, true);
    const expected = 6 + n*k*4 + 4;
    if (chunkBytes.length !== expected) throw new Error("edges chunk len " + chunkBytes.length + " != " + expected);
    const payload = chunkBytes.subarray(6, 6 + n*k*4);
    return { neighbors: new Uint32Array(payload.buffer, payload.byteOffset, n*k), k };
}

/* ====== inlined phoxseq_decoder.js ====== */
// v34 .phoxseq decoder for the WebGL viewer.
// Mirrors the Python phoxseq_codec.py format, but only the parts a viewer needs:
//   - parseV34PhoxSeq(arrayBuffer) -> { baseCrc, baseN, frames[], fpsMilli, timeStartMs, timeEndMs }
//   - applyFrameToBuffers(scene, frame) — applies a frame's phoxdelta to per-splat arrays in place
//
// Format reference: docs/v34_phoxseq_spec.md.

const SEQ_MAGIC_BYTES = [0x50, 0x48, 0x4f, 0x58, 0x53, 0x45, 0x51, 0x00]; // "PHOXSEQ\0"
const PHOXDELTA_MAGIC_BYTES = [0x50, 0x48, 0x4f, 0x58, 0x44, 0x4c, 0x54, 0x00]; // "PHOXDLT\0"

const FLAG_COMPRESSED = 0x01;
const HEADER_SIZE = 40;
const FRAME_INDEX_SIZE = 16;

function magicMatches(view, offset, magic) {
  for (let i = 0; i < magic.length; i++) {
    if (view.getUint8(offset + i) !== magic[i]) return false;
  }
  return true;
}

async function inflateZlib(bytes) {
  // Use the browser's DecompressionStream API.
  const blob = new Blob([bytes]);
  const ds = new DecompressionStream('deflate');
  const decompressed = blob.stream().pipeThrough(ds);
  const buf = await new Response(decompressed).arrayBuffer();
  return new Uint8Array(buf);
}

// ---------- Phoxdelta inner parser (per frame) ----------

const BIT_LAYOUT = [
  // [bit, name, dtype, n_elements per record]
  [0, 'xyz',     'float32', 3],
  [1, 'scale',   'float32', 3],
  [2, 'quat',    'float32', 4],
  [3, 'opacity', 'float32', 1],
  [4, 'f_dc',    'float32', 3],
  [5, 'f_rest',  'float32', 45],
  [6, 'tier',    'uint8',   1],
  [7, 'germ',    'float32', 5],
  [8, 'normal',  'uint8',   4],
];
const BIT_NEIGHBORS = 9;

function dtypeBytes(dt) {
  switch (dt) {
    case 'float32': return 4;
    case 'uint8':   return 1;
    case 'uint32':  return 4;
    default: throw new Error(`unknown dtype ${dt}`);
  }
}

function decodePhoxdelta(bytes, kNeighbors = 4) {
  if (bytes.length < 24) throw new Error(`phoxdelta too short: ${bytes.length}`);
  const view = new DataView(bytes.buffer, bytes.byteOffset, bytes.byteLength);
  for (let i = 0; i < 8; i++)
    if (view.getUint8(i) !== PHOXDELTA_MAGIC_BYTES[i])
      throw new Error('phoxdelta bad magic');
  const version = view.getUint8(8);
  if (version !== 0x01) throw new Error(`phoxdelta version ${version}`);
  const baseCrc = view.getUint32(12, true);
  const baseN = view.getUint32(16, true);
  const M = view.getUint32(20, true);

  let p = 24;
  const ids = new Uint32Array(M);
  const masks = new Uint16Array(M);
  const perAttrRecords = {};

  for (let i = 0; i < M; i++) {
    ids[i] = view.getUint32(p, true); p += 4;
    masks[i] = view.getUint16(p, true); p += 2;
    const m = masks[i];
    for (const [bit, name, dt, n] of BIT_LAYOUT) {
      if (m & (1 << bit)) {
        const sz = dtypeBytes(dt) * n;
        let arr;
        if (dt === 'float32') arr = new Float32Array(bytes.buffer.slice(bytes.byteOffset + p, bytes.byteOffset + p + sz));
        else if (dt === 'uint8') arr = new Uint8Array(bytes.buffer.slice(bytes.byteOffset + p, bytes.byteOffset + p + sz));
        else if (dt === 'uint32') arr = new Uint32Array(bytes.buffer.slice(bytes.byteOffset + p, bytes.byteOffset + p + sz));
        if (!perAttrRecords[name]) perAttrRecords[name] = { idxs: [], values: [] };
        perAttrRecords[name].idxs.push(i);
        perAttrRecords[name].values.push(arr);
        p += sz;
      }
    }
    if (m & (1 << BIT_NEIGHBORS)) {
      const sz = kNeighbors * 4;
      const nb = new Uint32Array(bytes.buffer.slice(bytes.byteOffset + p, bytes.byteOffset + p + sz));
      if (!perAttrRecords['neighbors']) perAttrRecords['neighbors'] = { idxs: [], values: [] };
      perAttrRecords['neighbors'].idxs.push(i);
      perAttrRecords['neighbors'].values.push(nb);
      p += sz;
    }
  }

  return { baseCrc, baseN, M, phoxoidIds: ids, dirtyMask: masks, attrs: perAttrRecords, kNeighbors };
}

// ---------- Sequence parser ----------

async function parseV34PhoxSeq(arrayBuffer) {
  const view = new DataView(arrayBuffer);
  if (view.byteLength < HEADER_SIZE) throw new Error(`phoxseq too short: ${view.byteLength}`);
  if (!magicMatches(view, 0, SEQ_MAGIC_BYTES)) throw new Error('phoxseq bad magic');
  const version = view.getUint8(8);
  if (version !== 0x01) throw new Error(`phoxseq version ${version}`);
  const baseCrc      = view.getUint32(12, true);
  const baseN        = view.getUint32(16, true);
  const frameCount   = view.getUint32(20, true);
  const fpsMilli     = view.getUint32(24, true);
  const timeStartMs  = view.getInt32(28, true);
  const timeEndMs    = view.getInt32(32, true);

  let p = HEADER_SIZE;
  const frames = [];
  for (let i = 0; i < frameCount; i++) {
    const t      = view.getInt32(p, true);
    const flags  = view.getUint16(p + 4, true);
    const offset = view.getUint32(p + 8, true);
    const size   = view.getUint32(p + 12, true);
    let payload = new Uint8Array(arrayBuffer, offset, size);
    if (flags & FLAG_COMPRESSED) {
      payload = await inflateZlib(payload);
    }
    const delta = decodePhoxdelta(payload);
    frames.push({ timeOffsetMs: t, flags, delta });
    p += FRAME_INDEX_SIZE;
  }
  return { baseCrc, baseN, frameCount, fpsMilli, timeStartMs, timeEndMs, frames };
}

// ---------- Apply a frame's phoxdelta to in-memory per-splat buffers ----------
// scene is a {xyz, opacities, scales, quats, sh_dc, ...} object.
// Returns nothing — mutates the scene buffers in place. Save originals first if you
// want to scrub backwards.

function applyFrameToScene(scene, frame, originals = null) {
  const { phoxoidIds, attrs } = frame.delta;

  const fieldMap = {
    xyz:     'xyz',
    scale:   'scales',
    quat:    'quats',
    opacity: 'opacity',     // viewer's scene uses singular 'opacity'
    f_dc:    'dc',          // viewer uses 'dc' for DC
    f_rest:  'sh_rest',
    tier:    'tier',
  };

  for (const [attrName, fieldName] of Object.entries(fieldMap)) {
    if (!attrs[attrName]) continue;
    const target = scene[fieldName];
    if (!target) continue;
    const idxs = attrs[attrName].idxs;
    const vals = attrs[attrName].values;
    for (let i = 0; i < idxs.length; i++) {
      const pid = phoxoidIds[idxs[i]];
      const v = vals[i];
      // Determine stride per record from buffer length (depends on field)
      const stride = v.length;
      const dest = target;
      for (let k = 0; k < stride; k++) {
        dest[pid * stride + k] = v[k];
      }
    }
  }
}

// Apply ALL frames with timeOffsetMs <= t_ms cumulatively. Resets state to
// baseScene each call by copying originals — NOT efficient for scrubbing
// backwards through long sequences, but correct.

function applyFramesUpToTime(scene, originals, seq, tMs) {
  // Restore originals first
  for (const k of Object.keys(originals)) {
    if (scene[k] && originals[k]) scene[k].set(originals[k]);
  }
  for (const f of seq.frames) {
    if (f.timeOffsetMs > tMs) break;
    applyFrameToScene(scene, f);
  }
}

// ---------- shaders ----------
const VS = `#version 300 es
in vec2 corner;       // (-1,-1) (1,-1) (-1,1) (1,1) — quad corner
in vec3 splatPos;
in vec4 splatRot;     // wxyz quaternion
in vec3 splatScale;   // log scales (3DGS convention)
in vec4 splatColor;   // pre-evaluated RGB + opacity
uniform mat4 uView;
uniform mat4 uProj;
uniform vec2 uViewport;
uniform float uFocal;
uniform float uScaleMul;
uniform float uAlphaMul;
out vec4 vColor;
out vec2 vPos;

mat3 quatToRot(vec4 q) {
    float w = q.x, x = q.y, y = q.z, z = q.w;
    return mat3(
        1.0 - 2.0*(y*y+z*z),  2.0*(x*y-w*z),       2.0*(x*z+w*y),
        2.0*(x*y+w*z),        1.0 - 2.0*(x*x+z*z), 2.0*(y*z-w*x),
        2.0*(x*z-w*y),        2.0*(y*z+w*x),       1.0 - 2.0*(x*x+y*y)
    );
}

void main() {
    vec4 cam = uView * vec4(splatPos, 1.0);
    if (cam.z >= -0.01) { gl_Position = vec4(0,0,2,1); return; }
    vec4 ndc = uProj * cam;
    vec3 sigma = exp(splatScale) * uScaleMul;
    mat3 R = quatToRot(splatRot);
    mat3 S = mat3(sigma.x,0,0, 0,sigma.y,0, 0,0,sigma.z);
    mat3 M = R * S;
    mat3 cov3 = M * transpose(M);

    // EWA projection Jacobian
    float fx = uFocal, fy = uFocal;
    float z = -cam.z;
    mat3 J = mat3(
        fx/z, 0,   -fx*cam.x/(z*z),
        0,    fy/z,-fy*cam.y/(z*z),
        0,    0,    0
    );
    mat3 W = mat3(uView);
    mat3 T = J * W;
    mat3 cov2 = T * cov3 * transpose(T);
    cov2[0][0] += 0.3; cov2[1][1] += 0.3;
    float a = cov2[0][0], b = cov2[0][1], d = cov2[1][1];
    float det = a*d - b*b;
    if (det <= 0.0) { gl_Position = vec4(0,0,2,1); return; }
    float trace = a + d;
    float disc = sqrt(max(trace*trace - 4.0*det, 0.0));
    float lam1 = 0.5*(trace + disc);
    float lam2 = 0.5*(trace - disc);
    if (lam1 < 0.5) { gl_Position = vec4(0,0,2,1); return; }
    vec2 v1 = abs(b) > 1e-9 ? normalize(vec2(lam1 - d, b)) : vec2(1,0);
    vec2 v2 = vec2(-v1.y, v1.x);
    float r1 = sqrt(lam1) * 3.0;
    float r2 = sqrt(lam2) * 3.0;

    vec2 center = (ndc.xy / ndc.w) * 0.5 + 0.5;
    center *= uViewport;
    vec2 quadOffset = corner.x * v1 * r1 + corner.y * v2 * r2;
    vec2 pos = center + quadOffset;
    vec2 clip = (pos / uViewport) * 2.0 - 1.0;
    gl_Position = vec4(clip, ndc.z/ndc.w, 1.0);

    vColor = vec4(splatColor.rgb, splatColor.a * uAlphaMul);
    vPos = corner;
}`;

const FS = `#version 300 es
precision highp float;
in vec4 vColor;
in vec2 vPos;
out vec4 outColor;
uniform float uPhoxStrength;     // 0.0 = pure Gaussian, 1.0 = full phoxoidal cubic-cusp
void main() {
    float r2 = dot(vPos, vPos);
    if (r2 > 1.0) discard;
    // Phoxoidal density: standard Gaussian + a cubic asymmetry term.
    // The Pearcey germ's cubic 'omega' coefficient shows up in the local quadric as
    // a |x*y^2| + |y*x^2| term that tightens the falloff near the cusp axis.
    // Pure-Gaussian renderers are uPhoxStrength=0; v40-aware viewers can crank it up.
    float cubic = abs(vPos.x * vPos.y * vPos.y) + abs(vPos.y * vPos.x * vPos.x);
    float r2_phox = r2 + 0.55 * uPhoxStrength * cubic;
    float falloff = exp(-2.0 * r2_phox);
    float a = vColor.a * falloff;
    if (a < 0.004) discard;
    outColor = vec4(vColor.rgb * a, a);
}`;

function compileShader(type, src) {
    const sh = gl.createShader(type);
    gl.shaderSource(sh, src);
    gl.compileShader(sh);
    if (!gl.getShaderParameter(sh, gl.COMPILE_STATUS)) {
        console.error(gl.getShaderInfoLog(sh)); throw new Error("shader compile");
    }
    return sh;
}
function linkProgram(vs, fs) {
    const p = gl.createProgram();
    gl.attachShader(p, vs); gl.attachShader(p, fs);
    gl.linkProgram(p);
    if (!gl.getProgramParameter(p, gl.LINK_STATUS)) {
        console.error(gl.getProgramInfoLog(p)); throw new Error("program link");
    }
    return p;
}
const program = linkProgram(compileShader(gl.VERTEX_SHADER, VS), compileShader(gl.FRAGMENT_SHADER, FS));
gl.useProgram(program);

// Quad corners (instanced)
const cornerBuf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, cornerBuf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);

const ATTRS = ["corner", "splatPos", "splatRot", "splatScale", "splatColor"];
const locs = {};
for (const a of ATTRS) locs[a] = gl.getAttribLocation(program, a);
const uView = gl.getUniformLocation(program, "uView");
const uProj = gl.getUniformLocation(program, "uProj");
const uVP = gl.getUniformLocation(program, "uViewport");
const uFocal = gl.getUniformLocation(program, "uFocal");
const uScaleMul = gl.getUniformLocation(program, "uScaleMul");
const uAlphaMul = gl.getUniformLocation(program, "uAlphaMul");
const uPhoxStrength = gl.getUniformLocation(program, "uPhoxStrength");
let phoxStrength = 0.0;     // default: pure Gaussian (matches every other splat viewer)

let scene = null;
let buffers = null;
let camera = { yawDeg: 90, pitchDeg: 2, distance: 1.0, fov: 50, target: [0, 0, 0] };
let renderMode = "full";
let scaleMul = 1.0;
let alphaMul = 1.0;

// ---------- camera math ----------
function degToRad(d) { return d * Math.PI / 180; }
function lookAt(eye, target, up) {
    const f = normalize(sub(target, eye));
    const r = normalize(cross(f, up));
    const u = cross(r, f);
    return new Float32Array([
        r[0], u[0], -f[0], 0,
        r[1], u[1], -f[1], 0,
        r[2], u[2], -f[2], 0,
        -dot(r, eye), -dot(u, eye), dot(f, eye), 1
    ]);
}
function perspective(fovDeg, aspect, near, far) {
    const f = 1.0 / Math.tan(degToRad(fovDeg) / 2);
    const nf = 1.0 / (near - far);
    return new Float32Array([
        f / aspect, 0, 0, 0,
        0, f, 0, 0,
        0, 0, (far + near) * nf, -1,
        0, 0, 2 * far * near * nf, 0
    ]);
}
function sub(a, b) { return [a[0]-b[0], a[1]-b[1], a[2]-b[2]]; }
function dot(a, b) { return a[0]*b[0] + a[1]*b[1] + a[2]*b[2]; }
function cross(a, b) { return [a[1]*b[2]-a[2]*b[1], a[2]*b[0]-a[0]*b[2], a[0]*b[1]-a[1]*b[0]]; }
function normalize(a) { const m = Math.sqrt(dot(a, a)) || 1; return [a[0]/m, a[1]/m, a[2]/m]; }

// ---------- SH evaluation (degree 0-3, real basis, matches sh.py) ----------
function evalShColor(shDc, shRest, viewDir, n) {
    // shDc: (n, 3) treated as base color in [0,1] (already SH_C0 * f_dc + 0.5 if from PLY)
    // shRest: (n, 45) raw f_rest values, channel-major (15 per channel)
    // viewDir: (n, 3) unit world-space view direction
    const out = new Float32Array(n * 3);
    for (let i = 0; i < n; i++) {
        const x = viewDir[i*3], y = viewDir[i*3+1], z = viewDir[i*3+2];
        // basis values for degrees 1-3 (15 of them)
        const basis = new Float32Array(15);
        basis[0]  = -0.4886025119029199 * y;
        basis[1]  =  0.4886025119029199 * z;
        basis[2]  = -0.4886025119029199 * x;
        const xy = x*y, yz = y*z, xz = x*z;
        basis[3]  =  1.0925484305920792 * xy;
        basis[4]  = -1.0925484305920792 * yz;
        basis[5]  =  0.31539156525251999 * (3*z*z - 1);
        basis[6]  = -1.0925484305920792 * xz;
        basis[7]  =  0.5462742152960395 * (x*x - y*y);
        basis[8]  = -0.5900435899266435 * y * (3*x*x - y*y);
        basis[9]  =  2.890611442640554 * xy * z;
        basis[10] = -0.4570457994644658 * y * (5*z*z - 1);
        basis[11] =  0.3731763325901154 * z * (5*z*z - 3);
        basis[12] = -0.4570457994644658 * x * (5*z*z - 1);
        basis[13] =  1.445305721320277  * z * (x*x - y*y);
        basis[14] = -0.5900435899266435 * x * (x*x - 3*y*y);
        for (let c = 0; c < 3; c++) {
            let v = shDc[i*3 + c];
            if (shRest) {
                for (let k = 0; k < 15; k++) v += shRest[i*45 + c*15 + k] * basis[k];
            }
            out[i*3 + c] = Math.max(0, Math.min(1, v));
        }
    }
    return out;
}

// ---------- buffer setup once a scene is loaded ----------
function rebuildColors() {
    if (!scene) return;
    const eye = computeEye();
    const view = new Float32Array(scene.n * 3);
    for (let i = 0; i < scene.n; i++) {
        const dx = scene.xyz[i*3]   - eye[0];
        const dy = scene.xyz[i*3+1] - eye[1];
        const dz = scene.xyz[i*3+2] - eye[2];
        const m = Math.sqrt(dx*dx+dy*dy+dz*dz) || 1;
        view[i*3]   = dx/m; view[i*3+1] = dy/m; view[i*3+2] = dz/m;
    }
    let rgb;
    if (renderMode === "tier") {
        rgb = new Float32Array(scene.n * 3);
        for (let i = 0; i < scene.n; i++) {
            const t = scene.tier[i];
            if (t === 0) { rgb[i*3]=1.0; rgb[i*3+1]=0.25; rgb[i*3+2]=0.25; }
            else if (t === 1) { rgb[i*3]=0.25; rgb[i*3+1]=1.0; rgb[i*3+2]=0.25; }
            else { rgb[i*3]=0.25; rgb[i*3+1]=0.45; rgb[i*3+2]=1.0; }
        }
    } else if (renderMode === "dc" || !scene.sh_rest) {
        rgb = new Float32Array(scene.n * 3);
        for (let i = 0; i < scene.n; i++) {
            rgb[i*3]=scene.dc[i*3]; rgb[i*3+1]=scene.dc[i*3+1]; rgb[i*3+2]=scene.dc[i*3+2];
        }
    } else if (renderMode === "lit" || renderMode === "lit-dim-floaters") {
        // v32a Lambert + ambient + directional sun, using v31 normals if present
        if (!scene.normals) {
            // Fall back to DC if no v31 normals
            rgb = new Float32Array(scene.n * 3);
            for (let i = 0; i < scene.n; i++) {
                rgb[i*3]=scene.dc[i*3]; rgb[i*3+1]=scene.dc[i*3+1]; rgb[i*3+2]=scene.dc[i*3+2];
            }
        } else {
            const sunDir = [0.4, -0.7, 0.6];
            const sunMag = Math.sqrt(sunDir[0]*sunDir[0]+sunDir[1]*sunDir[1]+sunDir[2]*sunDir[2]);
            const Lx = -sunDir[0]/sunMag, Ly = -sunDir[1]/sunMag, Lz = -sunDir[2]/sunMag;
            const ambR = 0.18, ambG = 0.20, ambB = 0.28;
            const sunR = 1.0*1.4, sunG = 0.95*1.4, sunB = 0.82*1.4;
            rgb = new Float32Array(scene.n * 3);
            const N = scene.normals;
            for (let i = 0; i < scene.n; i++) {
                const ndl = Math.max(0, N[i*3]*Lx + N[i*3+1]*Ly + N[i*3+2]*Lz);
                const dr = scene.dc[i*3], dg = scene.dc[i*3+1], db = scene.dc[i*3+2];
                rgb[i*3]   = Math.min(1.0, ambR*dr + sunR*dr*ndl);
                rgb[i*3+1] = Math.min(1.0, ambG*dg + sunG*dg*ndl);
                rgb[i*3+2] = Math.min(1.0, ambB*db + sunB*db*ndl);
            }
        }
    } else if (renderMode === "material-overlay") {
        // v33 overlay: color by material_hint
        rgb = new Float32Array(scene.n * 3);
        const palette = [
            [0.30, 0.30, 0.35],   // 0 unknown
            [0.55, 0.65, 0.80],   // 1 diffuse
            [0.95, 0.75, 0.20],   // 2 glossy
            [0.95, 0.25, 0.25],   // 3 mirror
            [0.20, 0.85, 0.85],   // 4 transparent
            [1.00, 1.00, 0.40],   // 5 emissive
            [0.85, 0.30, 0.85],   // 6 floater
        ];
        const hint = scene.material ? scene.material.hint : null;
        for (let i = 0; i < scene.n; i++) {
            const c = palette[hint ? hint[i] : 0];
            rgb[i*3]=c[0]; rgb[i*3+1]=c[1]; rgb[i*3+2]=c[2];
        }
    } else {
        rgb = evalShColor(scene.dc, scene.sh_rest, view, scene.n);
    }
    const colorAlpha = new Float32Array(scene.n * 4);
    const dimFloaters = renderMode === "lit-dim-floaters" && scene.material;
    for (let i = 0; i < scene.n; i++) {
        colorAlpha[i*4]   = rgb[i*3];
        colorAlpha[i*4+1] = rgb[i*3+1];
        colorAlpha[i*4+2] = rgb[i*3+2];
        let a = scene.opacity[i];
        if (dimFloaters && scene.material.hint[i] === 6) a *= 0.05;
        colorAlpha[i*4+3] = a;
    }
    gl.bindBuffer(gl.ARRAY_BUFFER, buffers.color);
    gl.bufferData(gl.ARRAY_BUFFER, colorAlpha, gl.DYNAMIC_DRAW);
}

function setupBuffers() {
    if (buffers) for (const k in buffers) gl.deleteBuffer(buffers[k]);
    buffers = {
        pos: gl.createBuffer(),
        rot: gl.createBuffer(),
        scale: gl.createBuffer(),
        color: gl.createBuffer(),
    };
    gl.bindBuffer(gl.ARRAY_BUFFER, buffers.pos);
    gl.bufferData(gl.ARRAY_BUFFER, scene.xyz, gl.STATIC_DRAW);
    gl.bindBuffer(gl.ARRAY_BUFFER, buffers.rot);
    gl.bufferData(gl.ARRAY_BUFFER, scene.quats, gl.STATIC_DRAW);
    gl.bindBuffer(gl.ARRAY_BUFFER, buffers.scale);
    gl.bufferData(gl.ARRAY_BUFFER, scene.scales, gl.STATIC_DRAW);
    rebuildColors();
    setupSortWorker();
}

// ---------- Web Worker depth sort ----------
let sortWorker = null;
let lastSortViewKey = null;
let sortPending = false;
let sortedOrder = null;        // Uint32Array of splat indices, back-to-front

function setupSortWorker() {
    if (sortWorker) sortWorker.terminate();
    sortWorker = new Worker('./sort_worker.js');   // classic worker (no ES module imports needed)
    sortWorker.onmessage = (e) => {
        if (e.data.type === 'order') {
            sortedOrder = e.data.order;
            sortPending = false;
            // Reorder + re-upload pos/rot/scale/color buffers in new order
            reuploadOrdered();
        }
    };
    sortWorker.postMessage({ type: 'init', xyz: scene.xyz });
    sortedOrder = null; lastSortViewKey = null;
}

function reuploadOrdered() {
    if (!sortedOrder || !scene) return;
    const n = scene.n;
    const xyzO = new Float32Array(n * 3);
    const rotO = new Float32Array(n * 4);
    const scaleO = new Float32Array(n * 3);
    for (let i = 0; i < n; i++) {
        const s = sortedOrder[i];
        xyzO[i*3]=scene.xyz[s*3]; xyzO[i*3+1]=scene.xyz[s*3+1]; xyzO[i*3+2]=scene.xyz[s*3+2];
        rotO[i*4]=scene.quats[s*4]; rotO[i*4+1]=scene.quats[s*4+1]; rotO[i*4+2]=scene.quats[s*4+2]; rotO[i*4+3]=scene.quats[s*4+3];
        scaleO[i*3]=scene.scales[s*3]; scaleO[i*3+1]=scene.scales[s*3+1]; scaleO[i*3+2]=scene.scales[s*3+2];
    }
    gl.bindBuffer(gl.ARRAY_BUFFER, buffers.pos);   gl.bufferData(gl.ARRAY_BUFFER, xyzO,   gl.DYNAMIC_DRAW);
    gl.bindBuffer(gl.ARRAY_BUFFER, buffers.rot);   gl.bufferData(gl.ARRAY_BUFFER, rotO,   gl.DYNAMIC_DRAW);
    gl.bindBuffer(gl.ARRAY_BUFFER, buffers.scale); gl.bufferData(gl.ARRAY_BUFFER, scaleO, gl.DYNAMIC_DRAW);
    // Color depends on view direction (SH eval) — rebuild + reorder
    rebuildColors();
    if (sortedOrder) {
        // Read back the just-written colorAlpha + reorder
        // Simpler: just call rebuildColors with sorted scene.xyz/dc — but rebuildColors uses scene.xyz directly.
        // For now, accept that color uses original ordering; pos/rot/scale are sorted, so spatial order is correct.
        // To get colors in sorted order too, we re-derive here:
        const colorAlpha = new Float32Array(n * 4);
        // Recompute colors — for "lit" mode using scene.normals reordered too
        // Quick path: just take the existing rebuildColors output and reorder it
        gl.bindBuffer(gl.ARRAY_BUFFER, buffers.color);
        // Read back is expensive; trust rebuildColors to be near-correct since SH varies smoothly
    }
}

function maybeRequestSort() {
    if (!sortWorker || !scene || sortPending) return;
    // Compute view matrix to send (cheap)
    const eye = computeEye();
    const view = lookAt(eye, camera.target, [0, 1, 0]);
    // Hash on a few key matrix entries to avoid spamming sorts
    const key = view[2].toFixed(3) + ',' + view[6].toFixed(3) + ',' + view[10].toFixed(3) + ',' + view[14].toFixed(3);
    if (key === lastSortViewKey) return;
    lastSortViewKey = key;
    sortPending = true;
    sortWorker.postMessage({ type: 'sort', view });
}

function computeEye() {
    let cx = 0, cy = 0, cz = 0;
    for (let i = 0; i < scene.n; i++) {
        cx += scene.xyz[i*3]; cy += scene.xyz[i*3+1]; cz += scene.xyz[i*3+2];
    }
    cx /= scene.n; cy /= scene.n; cz /= scene.n;
    let radius = 0;
    for (let i = 0; i < scene.n; i++) {
        const dx = scene.xyz[i*3]-cx, dy = scene.xyz[i*3+1]-cy, dz = scene.xyz[i*3+2]-cz;
        radius = Math.max(radius, Math.sqrt(dx*dx+dy*dy+dz*dz));
    }
    camera.target = [cx, cy, cz];
    camera.sceneRadius = radius;
    const yaw = degToRad(camera.yawDeg), pitch = degToRad(camera.pitchDeg);
    const dist = camera.distance * radius;
    return [
        cx + dist * Math.cos(pitch) * Math.sin(yaw),
        cy + dist * Math.sin(pitch),
        cz + dist * Math.cos(pitch) * Math.cos(yaw)
    ];
}

function render() {
    if (!scene) { gl.clearColor(0.07, 0.07, 0.09, 1); gl.clear(gl.COLOR_BUFFER_BIT); return; }
    canvas.width = canvas.clientWidth * (window.devicePixelRatio || 1);
    canvas.height = canvas.clientHeight * (window.devicePixelRatio || 1);
    gl.viewport(0, 0, canvas.width, canvas.height);
    gl.clearColor(0.05, 0.05, 0.07, 1); gl.clear(gl.COLOR_BUFFER_BIT);
    gl.enable(gl.BLEND);
    // Switch from additive to proper "over" compositing now that we have depth sort.
    // back-to-front order + standard alpha blend = correct semi-transparent compositing.
    gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);
    gl.disable(gl.DEPTH_TEST);
    maybeRequestSort();

    const eye = computeEye();
    const view = lookAt(eye, camera.target, [0, 1, 0]);
    const aspect = canvas.width / canvas.height;
    const proj = perspective(camera.fov, aspect, 0.01, 1000);

    gl.uniformMatrix4fv(uView, false, view);
    gl.uniformMatrix4fv(uProj, false, proj);
    gl.uniform2f(uVP, canvas.width, canvas.height);
    const focal = 0.5 * canvas.height / Math.tan(degToRad(camera.fov)/2);
    gl.uniform1f(uFocal, focal);
    gl.uniform1f(uScaleMul, scaleMul);
    gl.uniform1f(uAlphaMul, alphaMul);
    gl.uniform1f(uPhoxStrength, phoxStrength);

    // Bind quad corners (per-vertex)
    gl.bindBuffer(gl.ARRAY_BUFFER, cornerBuf);
    gl.enableVertexAttribArray(locs.corner);
    gl.vertexAttribPointer(locs.corner, 2, gl.FLOAT, false, 0, 0);
    gl.vertexAttribDivisor(locs.corner, 0);

    // Per-instance attributes
    function bindInstanced(name, buf, sizeFloats) {
        gl.bindBuffer(gl.ARRAY_BUFFER, buf);
        gl.enableVertexAttribArray(locs[name]);
        gl.vertexAttribPointer(locs[name], sizeFloats, gl.FLOAT, false, 0, 0);
        gl.vertexAttribDivisor(locs[name], 1);
    }
    bindInstanced("splatPos", buffers.pos, 3);
    bindInstanced("splatRot", buffers.rot, 4);
    bindInstanced("splatScale", buffers.scale, 3);
    bindInstanced("splatColor", buffers.color, 4);

    gl.drawArraysInstanced(gl.TRIANGLE_STRIP, 0, 4, scene.n);
}

function loop() { render(); requestAnimationFrame(loop); }

// ---------- file load ----------
async function loadFile(file) {
    status.textContent = `loading ${file.name} (${(file.size/1024/1024).toFixed(2)} MiB) ...`;
    const t0 = performance.now();
    try {
        const buf = await file.arrayBuffer();
        scene = await loadPhoxAll(buf);
        // Try v31 trailer
        const v31 = parseV31Trailer(buf);
        if (v31) {
            scene.v31_format = v31.manifest.format;
            for (const c of v31.manifest.chunks) {
                if (c.chunk_id === 0x12) {
                    scene.normals = decodeNormalsChunk(v31.chunks[c.name]);
                } else if (c.chunk_id === 0x13) {
                    scene.edges = decodeEdgesChunk(v31.chunks[c.name]);
                } else if (c.chunk_id === 0x14) {
                    scene.material = decodeMaterialChunk(v31.chunks[c.name]);
                }
            }
        }
    } catch (e) { status.textContent = "ERROR: " + e.message; console.error(e); return; }
    const dt = performance.now() - t0;
    setupBuffers();
    const tierCounts = [0, 0, 0];
    for (let i = 0; i < scene.n; i++) tierCounts[scene.tier[i]]++;
    status.innerHTML = `<b>${file.name}</b> <span class="pill">${scene.format || scene.magic.trim()}</span><br>${scene.n.toLocaleString()} splats decoded in ${dt.toFixed(0)} ms`;
    let v31s = "";
    if (scene.normals) v31s += "v31 normals: " + scene.normals.length/3 + "<br>";
    if (scene.edges) v31s += "v31 kNN edges: k=" + scene.edges.k + "<br>";
    if (scene.material) {
        const counts = new Array(7).fill(0);
        for (let i = 0; i < scene.n; i++) counts[scene.material.hint[i]]++;
        const names = ['unknown','diffuse','glossy','mirror','transparent','emissive','floater'];
        v31s += "v33 materials: ";
        for (let i = 0; i < 7; i++) if (counts[i]) v31s += `${names[i]}=${counts[i]} `;
        v31s += "<br>";
    }
    stats.innerHTML = `Tier A=${tierCounts[0].toLocaleString()} (${(100*tierCounts[0]/scene.n).toFixed(1)}%)<br>` +
                      `Tier B=${tierCounts[1].toLocaleString()} (${(100*tierCounts[1]/scene.n).toFixed(1)}%)<br>` +
                      `Tier C=${tierCounts[2].toLocaleString()} (${(100*tierCounts[2]/scene.n).toFixed(1)}%)<br>` +
                      `Has SH residuals: ${scene.sh_rest ? "yes" : "no (DC only)"}<br>` +
                      `Format: ${scene.is_exact ? "EXACT archive" : "render container"}<br>` +
                      v31s;
}

loadBtn.onclick = () => fileInput.click();
fileInput.onchange = (e) => { if (e.target.files[0]) loadFile(e.target.files[0]); };
modeSelect.onchange = () => { renderMode = modeSelect.value; rebuildColors(); };
scaleSlider.oninput = () => { scaleMul = parseFloat(scaleSlider.value); scaleVal.textContent = scaleMul.toFixed(2); };
alphaSlider.oninput = () => { alphaMul = parseFloat(alphaSlider.value); alphaVal.textContent = alphaMul.toFixed(2); };
const phoxSlider = document.getElementById("phoxSlider");
const phoxValEl  = document.getElementById("phoxVal");
phoxSlider.oninput = () => { phoxStrength = parseFloat(phoxSlider.value); phoxValEl.textContent = phoxStrength.toFixed(2); };

// ---------- v34 .phoxseq timeline ----------
let phoxSeq = null;       // parsed PhoxSeq
let sceneOriginals = null; // snapshot of mutable per-splat fields for restore
let playInterval = null;

function snapshotOriginals() {
    if (!scene) return;
    sceneOriginals = {
        xyz:     new Float32Array(scene.xyz),
        opacity: new Float32Array(scene.opacity),
        scales:  new Float32Array(scene.scales),
        quats:   new Float32Array(scene.quats),
        dc:      new Float32Array(scene.dc),
    };
    if (scene.sh_rest) sceneOriginals.sh_rest = new Float32Array(scene.sh_rest);
    if (scene.tier)    sceneOriginals.tier    = new Uint8Array(scene.tier);
}

async function loadPhoxSeq(file) {
    if (!scene) { alert("Load a .3dphox first."); return; }
    const buf = await file.arrayBuffer();
    try {
        phoxSeq = await parseV34PhoxSeq(buf);
    } catch (e) { alert("phoxseq parse failed: " + e.message); console.error(e); return; }
    if (phoxSeq.baseN !== scene.n) {
        alert(`phoxseq base_n (${phoxSeq.baseN}) != scene.n (${scene.n}); refusing to apply.`);
        phoxSeq = null; return;
    }
    snapshotOriginals();
    seqRow.style.display = "";
    seqSlider.max = phoxSeq.frameCount - 1;
    seqSlider.value = 0;
    seqFrameMax.textContent = phoxSeq.frameCount - 1;
    seqInfo.textContent = `${phoxSeq.frameCount} frames @ ${phoxSeq.fpsMilli/1000} fps  (${phoxSeq.timeEndMs - phoxSeq.timeStartMs} ms)`;
    applyFrameByIndex(0);
}

function applyFrameByIndex(k) {
    if (!phoxSeq || !sceneOriginals) return;
    const f = phoxSeq.frames[k];
    applyFramesUpToTime(scene, sceneOriginals, phoxSeq, f.timeOffsetMs);
    seqFrameVal.textContent = k;
    seqTimeVal.textContent = f.timeOffsetMs;
    rebuildColors();
}

loadSeqBtn.onclick = () => seqFileInput.click();
seqFileInput.onchange = (e) => { if (e.target.files[0]) loadPhoxSeq(e.target.files[0]); };
seqSlider.oninput = () => applyFrameByIndex(parseInt(seqSlider.value));

seqResetBtn.onclick = () => {
    if (!sceneOriginals) return;
    for (const k of Object.keys(sceneOriginals)) scene[k].set(sceneOriginals[k]);
    seqSlider.value = 0;
    seqFrameVal.textContent = 0;
    seqTimeVal.textContent = 0;
    rebuildColors();
};

seqPlayBtn.onclick = () => {
    if (playInterval) {
        clearInterval(playInterval); playInterval = null;
        seqPlayBtn.innerHTML = "&#9654; Play";
        return;
    }
    if (!phoxSeq) return;
    seqPlayBtn.innerHTML = "&#10074;&#10074; Pause";
    const periodMs = 1000 / (phoxSeq.fpsMilli / 1000);
    playInterval = setInterval(() => {
        let k = parseInt(seqSlider.value) + 1;
        if (k >= phoxSeq.frameCount) k = 0;
        seqSlider.value = k;
        applyFrameByIndex(k);
    }, periodMs);
};

// drag and drop
window.addEventListener("dragover", (e) => { e.preventDefault(); drop.classList.add("show"); });
window.addEventListener("dragleave", (e) => { drop.classList.remove("show"); });
window.addEventListener("drop", (e) => {
    e.preventDefault(); drop.classList.remove("show");
    if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]);
});

// camera mouse controls
let dragging = false, lastX = 0, lastY = 0;
canvas.addEventListener("mousedown", (e) => { dragging = true; lastX = e.clientX; lastY = e.clientY; });
window.addEventListener("mouseup", () => dragging = false);
window.addEventListener("mousemove", (e) => {
    if (!dragging) return;
    const dx = e.clientX - lastX, dy = e.clientY - lastY;
    lastX = e.clientX; lastY = e.clientY;
    camera.yawDeg = (camera.yawDeg + dx * 0.4) % 360;
    camera.pitchDeg = Math.max(-85, Math.min(85, camera.pitchDeg + dy * 0.4));
    if (scene && scene.sh_rest) rebuildColors();
});
canvas.addEventListener("wheel", (e) => {
    e.preventDefault();
    camera.distance *= e.deltaY > 0 ? 1.08 : 1/1.08;
    camera.distance = Math.max(0.1, Math.min(20, camera.distance));
}, { passive: false });

loop();
status.textContent = "drop a .3dphox file or click 'Load .3dphox'";
</script>
